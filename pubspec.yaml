name: chat_app
description: "A simple multi-user chat app with local authentication."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  provider: ^6.1.4
  supabase_flutter: ^2.8.4
  flutter_dotenv: ^5.2.1
  http: ^1.6.0
  flutter_webrtc: ^0.12.8
  file_picker: ^8.1.6
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - app_logo.png

